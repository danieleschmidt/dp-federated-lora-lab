apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: dp-federated-lora-hpa
  namespace: dp-federated-lora-global
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: dp-federated-lora-global
  minReplicas: 9
  maxReplicas: 150
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  - type: Pods
    pods:
      metric:
        name: federated_learning_requests_per_second
      target:
        type: AverageValue
        averageValue: "100"
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 60
      - type: Pods
        value: 10
        periodSeconds: 60
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 300
      - type: Pods
        value: 5
        periodSeconds: 300
      selectPolicy: Min
